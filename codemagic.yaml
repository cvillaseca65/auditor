# iOS: firma + subida a App Store Connect (ver procesamiento en ASC / TestFlight).
#
# Codemagic (YAML):
#   https://docs.codemagic.io/yaml-publishing/app-store-connect/
#   https://docs.codemagic.io/yaml-code-signing/signing-ios/
# Apple (clave API ASC):
#   https://developer.apple.com/documentation/appstoreconnectapi/creating_api_keys_for_app_store_connect_api
#
# Requisitos Apple / Codemagic:
# - La clave API debe tener rol "App Manager" (o permisos equivalentes para publicar).
# - Debe existir la ficha de la app en App Store Connect; la primera subida a veces conviene hacerla manual.
# - El IPA debe firmarse con certificado de distribución (App Store) + perfil App Store.
#
# Variables (Codemagic → App → Environment variables → grupo "group", nombres oficiales):
#   APP_STORE_CONNECT_PRIVATE_KEY     Secret: contenido completo del .p8 (PEM)
#   APP_STORE_CONNECT_KEY_IDENTIFIER  Key ID (tabla de claves en ASC)
#   APP_STORE_CONNECT_ISSUER_ID       Issuer ID (encima de la tabla en ASC)
#
# Alternativa en UI: Team integrations → Developer Portal con la misma clave .p8;
#   entonces en YAML se usaría integrations.app_store_connect + auth: integration
#   en lugar de api_key/key_id/issuer_id aquí (no mezclar ambos enfoques).
#
# Firma: certificado .p12 distribución + .mobileprovision App Store para com.simfour.auditor
#   (o fetch desde el portal si lo configuraste en Code signing identities).

workflows:
  ios-workflow:
    name: iOS App Store
    max_build_duration: 120
    environment:
      flutter: stable
      # iOS 26 SDK (Xcode 26) — requisito Apple para subir a partir del 28 abr 2026 (ITMS-90725).
      # https://docs.codemagic.io/specs-macos/xcode-26-0/
      xcode: 26.0
      groups:
        - group
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.simfour.auditor

    # https://docs.codemagic.io/yaml-basic-configuration/yaml-getting-started/#cache
    cache:
      cache_paths:
        - ~/.pub-cache
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Dependencies
        script: |
          set -e
          flutter pub get
          (cd ios && pod install)

      - name: Code signing
        script: |
          set -e
          mkdir -p build/logs
          xcode-project use-profiles 2>&1 | tee build/logs/use-profiles.log

      - name: Build IPA
        script: |
          set -e
          mkdir -p build/logs
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist 2>&1 | tee build/logs/ipa-build.log
          ls -lah build/ios/ipa | tee build/logs/ipa-list.log

    publishing:
      app_store_connect:
        # Misma forma que en la doc de variables de entorno (no uses auth: integration a la vez).
        # En el log, Codemagic puede mostrar --private-key @env:APP_STORE_CONNECT_PUBLISHER_PRIVATE_KEY;
        # es la clave inyectada desde tu secreto (p. ej. APP_STORE_CONNECT_PRIVATE_KEY). Éxito = "UPLOAD SUCCEEDED".
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        # Por defecto solo sube el IPA; submit_to_testflight / submit_to_app_store son post-proceso opcional:
        # https://docs.codemagic.io/yaml-publishing/app-store-connect/#post-processing-of-app-store-connect-distribution-magic-actions

    artifacts:
      - build/ios/ipa/*.ipa
      - build/logs/**/*
