workflows:
  ios-workflow:
    name: iOS Build for App Store
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build iOS IPA for App Store
        script: flutter build ipa --release --export-method app-store --export-options-plist ios/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa