workflows:
  ios-workflow:
    name: Build iOS → App Store
    max_build_duration: 120
    environment:
      flutter: stable

      # Usa los certificados/perfiles que hayas subido en Codemagic UI
      # (Code signing identities). Se emparejan por bundle id y tipo.
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.simfour.auditor

    # Recomendado: usar la integración de Codemagic (evita pedir variables de entorno en YAML).
    # En Codemagic UI, Team settings -> Integrations -> App Store Connect -> "Add key"
    # y pon aquí el "API key name" exactamente como esté en Codemagic.
    integrations:
      app_store_connect: YOUR_APP_STORE_CONNECT_API_KEY_NAME

    scripts:
      - name: Create build logs folder
        script: |
          mkdir -p build/logs

      - name: Get Flutter packages
        script: |
          flutter clean
          flutter pub get

      - name: Apply provisioning profiles
        script: xcode-project use-profiles 2>&1 | tee build/logs/use-profiles.log

      - name: Build IPA
        script: |
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist 2>&1 | tee build/logs/ipa-build.log
          ls -lah build/ios/ipa | tee build/logs/ipa-list.log

    publishing:
      app_store_connect:
        auth: integration

        # Envía el build para revisión en App Store (post-processing, sin mac).
        submit_to_app_store: true

    artifacts:
      - build/ios/ipa/*.ipa
      - build/logs/**/*