workflows:
  ios-workflow:
    name: Build iOS → TestFlight
    max_build_duration: 120

    environment:
      flutter: stable

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.simfour.auditor

      vars:
        # IMPORTANT:
        # - APP_STORE_CONNECT_KEY_IDENTIFIER must be the 10-char Key ID
        # - APP_STORE_CONNECT_ISSUER_ID must be the UUID Issuer ID
        APP_STORE_CONNECT_KEY_IDENTIFIER: R97NT58B23
        APP_STORE_CONNECT_ISSUER_ID: ec9ff855-ec3d-4f93-9ba7-a23821f39c52
        APP_STORE_CONNECT_PRIVATE_KEY: |
          -----BEGIN PRIVATE KEY-----
          MIGTAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBHkwdwIBAQQgob3ndJcXiXUclBXq
          no+YWCP6TKkQsFuuFFSuWGBY9zqgCgYIKoZIzj0DAQehRANCAAQcanjyib4wQJrM
          ugqjFj6Wa78TN/6ytQGj2sjXJVLDpbxZHEkXc8FHRfSJ5e4V2WRxEY5441Jx1Pf5
          Pe+DXlJW
          -----END PRIVATE KEY-----

    scripts:
      - name: Ensure logs folder exists
        script: |
          mkdir -p build/ios/ipa/logs

      - name: Get Flutter packages
        script: |
          flutter clean
          flutter pub get

      - name: Install signing files
        script: |
          keychain initialize
          app-store-connect fetch-signing-files com.simfour.auditor --type IOS_APP_STORE
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          flutter build ipa --release

      - name: Upload IPA to TestFlight
        script: |
          mkdir -p private_keys
          # app-store-connect expects AuthKey_<KEY_ID>.p8 in the private_keys folder
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > "private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"

          app-store-connect publish \
            --path build/ios/ipa/*.ipa \
            --testflight \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --private-key "private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8" \
            --verbose

      - name: Show IPA and logs
        script: |
          ls -lah build/ios/ipa
          echo "=== Logs ==="
          ls -lah build/ios/ipa/logs

    artifacts:
      - build/ios/ipa/*.ipa