workflows:
  ios-workflow:
    name: Build iOS → TestFlight
    max_build_duration: 60

    environment:
      flutter: stable

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.simfour.auditor

      vars:
        APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID
        APP_STORE_CONNECT_KEY_IDENTIFIER: $APP_STORE_CONNECT_KEY_IDENTIFIER
        APP_STORE_CONNECT_PRIVATE_KEY: $APP_STORE_CONNECT_PRIVATE_KEY

    scripts:
      - name: Prepare logs
        script: |
          mkdir -p build/ios/ipa/logs
          LOGFILE=build/ios/ipa/logs/full_build.log
          echo "=== START FULL BUILD LOG ===" > $LOGFILE

      - name: Get Flutter packages
        script: |
          mkdir -p build/ios/ipa/logs
          flutter clean | tee build/ios/ipa/logs/full_build.log
          flutter pub get | tee -a build/ios/ipa/logs/full_build.log

      - name: Install signing files
        script: |
          LOGFILE=build/ios/ipa/logs/full_build.log
          echo "=== Install signing files ===" | tee -a $LOGFILE
          keychain initialize 2>&1 | tee -a $LOGFILE
          app-store-connect fetch-signing-files com.simfour.auditor --type IOS_APP_STORE 2>&1 | tee -a $LOGFILE
          keychain add-certificates 2>&1 | tee -a $LOGFILE
          xcode-project use-profiles 2>&1 | tee -a $LOGFILE

      - name: Build IPA
        script: |
          LOGFILE=build/ios/ipa/logs/full_build.log
          echo "=== Build IPA ===" | tee -a $LOGFILE
          flutter build ipa --release 2>&1 | tee -a $LOGFILE

      - name: Upload IPA to TestFlight
        script: |
          LOGFILE=build/ios/ipa/logs/full_build.log
          echo "=== Upload IPA to TestFlight ===" | tee -a $LOGFILE

          # Guardar la clave .p8 en un archivo temporal
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/private_key.p8
          chmod 600 ~/private_key.p8
          echo "Private key saved to ~/private_key.p8" | tee -a $LOGFILE

          xcrun altool \
            --upload-app \
            --type ios \
            --file build/ios/ipa/*.ipa \
            --apiKey $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --apiIssuer $APP_STORE_CONNECT_ISSUER_ID \
            --private-key ~/private_key.p8 2>&1 | tee -a $LOGFILE

      - name: Show IPA and logs
        script: |
          LOGFILE=build/ios/ipa/logs/full_build.log
          echo "=== IPA FILES ===" | tee -a $LOGFILE
          ls -lah build/ios/ipa | tee -a $LOGFILE
          echo "=== FULL BUILD LOG END ===" | tee -a $LOGFILE

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/ipa/logs/full_build.log