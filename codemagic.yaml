workflows:
  ios-workflow:
    name: iOS Build for App Store
    max_build_duration: 60

    integrations:
      app_store_connect: codemagic

    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.simfour.auditor

    scripts:
      - name: Get Flutter packages
        script: |
          flutter clean
          flutter pub get

      - name: Install signing files
        script: |
          keychain initialize
          app-store-connect fetch-signing-files com.simfour.auditor --type IOS_APP_STORE
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA for App Store
        script: |
          echo "Cleaning and getting packages again"
          flutter clean
          flutter pub get

          echo "Building Flutter iOS app without code signing"
          flutter build ios --release --no-codesign

          echo "Archiving app with Xcode"
          mkdir -p build/ios/archive
          xcodebuild -workspace Runner.xcworkspace \
                     -scheme Runner \
                     -configuration Release \
                     -archivePath build/ios/archive/Runner.xcarchive archive

          echo "Exporting IPA using ExportOptions.plist"
          mkdir -p build/ios/ipa
          xcodebuild -exportArchive \
                     -archivePath build/ios/archive/Runner.xcarchive \
                     -exportOptionsPlist ExportOptions.plist \
                     -exportPath build/ios/ipa

          echo "IPA built at build/ios/ipa/App.ipa"
          ls -l build/ios/ipa

      - name: Publish IPA with verbose logging
        script: |
          mkdir -p build/ios/ipa/logs
          app-store-connect publish --path build/ios/ipa/App.ipa --verbose 2>&1 | tee build/ios/ipa/logs/publish.log

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/ipa/logs/publish.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true