workflows:
  ios-workflow:
    name: iOS Build & Publish to TestFlight
    max_build_duration: 60

    integrations:
      app_store_connect: codemagic

    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.simfour.auditor

    scripts:
      - name: Flutter clean & get packages
        script: |
          flutter clean
          flutter pub get

      - name: Install signing certificates and profiles
        script: |
          keychain initialize
          app-store-connect fetch-signing-files com.simfour.auditor --type IOS_APP_STORE
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA with Flutter
        script: |
          flutter build ipa --release

      - name: Verify generated IPA
        script: |
          echo "=== IPA FILES ==="
          ls -lah build/ios/ipa

          echo "=== IPA STRUCTURE ==="
          unzip -l build/ios/ipa/*.ipa | head -100

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true