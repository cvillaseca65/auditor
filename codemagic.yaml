workflows:
  ios-workflow:
    name: iOS Build for App Store
    max_build_duration: 60

    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.simfour.auditor

    scripts:
      - name: Get Flutter packages
        script: |
          flutter clean
          flutter pub get

      - name: Build IPA
        script: flutter build ipa --release --export-method app-store

    artifacts:
      - build/ios/ipa/*.ipa