workflows:
  ios-workflow:
    name: Build iOS → App Store
    max_build_duration: 120
    environment:
      flutter: stable

      # Usa los certificados/perfiles que hayas subido en Codemagic UI
      # (Code signing identities). Se emparejan por bundle id y tipo.
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.simfour.auditor

      vars:
        # IMPORTANT:
        # - APP_STORE_CONNECT_KEY_IDENTIFIER must be the 10-char Key ID
        # - APP_STORE_CONNECT_ISSUER_ID must be the UUID Issuer ID
        APP_STORE_CONNECT_KEY_IDENTIFIER: R97NT58B23
        APP_STORE_CONNECT_ISSUER_ID: ec9ff855-ec3d-4f93-9ba7-a23821f39c52
        APP_STORE_CONNECT_PRIVATE_KEY: |
          -----BEGIN PRIVATE KEY-----
          MIGTAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBHkwdwIBAQQgob3ndJcXiXUclBXq
          no+YWCP6TKkQsFuuFFSuWGBY9zqgCgYIKoZIzj0DAQehRANCAAQcanjyib4wQJrM
          ugqjFj6Wa78TN/6ytQGj2sjXJVLDpbxZHEkXc8FHRfSJ5e4V2WRxEY5441Jx1Pf5
          Pe+DXlJW
          -----END PRIVATE KEY-----

    scripts:
      - name: Create build logs folder
        script: |
          mkdir -p build/logs

      - name: Get Flutter packages
        script: |
          flutter clean
          flutter pub get

      - name: Apply provisioning profiles
        script: xcode-project use-profiles 2>&1 | tee build/logs/use-profiles.log

      - name: Build IPA
        script: |
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist 2>&1 | tee build/logs/ipa-build.log
          ls -lah build/ios/ipa | tee build/logs/ipa-list.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID

        # Post-processing (no requiere mac):
        # Envía el build para revisión en App Store.
        submit_to_app_store: true

    artifacts:
      - build/ios/ipa/*.ipa
      - build/logs/**/*