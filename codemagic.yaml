workflows:
  ios-workflow:
    name: Build iOS → Upload TestFlight
    max_build_duration: 60

    environment:
      flutter: stable

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.simfour.auditor

      # Variables de entorno que debes configurar en Codemagic
      vars:
        APP_STORE_CONNECT_ISSUER_ID: "2f594fd1-0323-44bb-8457-7e1575694497"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "R97NT58B23"
        APP_STORE_CONNECT_PRIVATE_KEY: |
          -----BEGIN PRIVATE KEY-----
          MIGTAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBHkwdwIBAQQgob3ndJcXiXUclBXq
          no+YWCP6TKkQsFuuFFSuWGBY9zqgCgYIKoZIzj0DAQehRANCAAQcanjyib4wQJrM
          ugqjFj6Wa78TN/6ytQGj2sjXJVLDpbxZHEkXc8FHRfSJ5e4V2WRxEY5441Jx1Pf5
          Pe+DXlJW
          -----END PRIVATE KEY-----

    scripts:
      - name: Get Flutter packages
        script: |
          flutter clean
          flutter pub get

      - name: Install signing files
        script: |
          keychain initialize
          app-store-connect fetch-signing-files com.simfour.auditor --type IOS_APP_STORE
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          flutter build ipa --release

      - name: Upload IPA to TestFlight
        script: |
          # Crear la carpeta de keys
          mkdir -p ~/.appstoreconnect/private_keys
          
          # Crear el archivo .p8 a partir de la variable de entorno
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey.p8

          # Subir la IPA
          xcrun altool \
            --upload-app \
            --type ios \
            --file build/ios/ipa/*.ipa \
            --apiKey $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --apiIssuer $APP_STORE_CONNECT_ISSUER_ID

      - name: Show IPA
        script: |
          ls -lah build/ios/ipa

    artifacts:
      - build/ios/ipa/*.ipa