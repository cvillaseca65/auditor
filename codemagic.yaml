workflows:
  ios-workflow:
    name: Build iOS → App Store
    max_build_duration: 120
    environment:
      flutter: stable
      groups:
        - group

      # Usa los certificados/perfiles que hayas subido en Codemagic UI
      # (Code signing identities). Se emparejan por bundle id y tipo.
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.simfour.auditor

    scripts:
      - name: Get Flutter packages
        script: |
          flutter clean
          flutter pub get

      - name: Apply provisioning profiles
        script: |
          mkdir -p build/logs
          xcode-project use-profiles 2>&1 | tee build/logs/use-profiles.log

      - name: Build IPA
        script: |
          mkdir -p build/logs
          # Use export options generated by xcode-project use-profiles in CI
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist 2>&1 | tee build/logs/ipa-build.log
          ls -lah build/ios/ipa | tee build/logs/ipa-list.log
      - name: Publish IPA to App Store Connect (verbose)
        script: |
          mkdir -p build/logs private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > "private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          app-store-connect publish \
            --path "build/ios/ipa/*.ipa" \
            --app-store \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8" \
            --verbose 2>&1 | tee build/logs/appstore-publish.log

    artifacts:
      - build/ios/ipa/*.ipa
      - build/logs/**/*