workflows:
  ios-workflow:
    name: iOS Build for App Store
    max_build_duration: 60

    integrations:
      app_store_connect: codemagic

    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.simfour.auditor

    scripts:
      - name: Get Flutter packages
        script: |
          flutter clean
          flutter pub get

      - name: Install signing files
        script: |
          keychain initialize
          app-store-connect fetch-signing-files com.simfour.auditor --type IOS_APP_STORE
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA for App Store
        script: |
          flutter build ipa --release --export-method app-store --no-codesign

      - name: Inspect IPA
        script: |
          mkdir -p build/ios/ipa/logs
          unzip -l build/ios/ipa/*.ipa | tee build/ios/ipa/logs/ipa_contents.log

      - name: Publish IPA to App Store Connect
        script: |
          mkdir -p build/ios/ipa/logs
          app-store-connect publish --path build/ios/ipa/*.ipa --verbose | tee build/ios/ipa/logs/publish.log

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/ipa/logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true