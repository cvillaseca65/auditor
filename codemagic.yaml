workflows:
  ios-workflow:
    name: iOS Build for App Store
    max_build_duration: 60

    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.simfour.auditor
        team_id: MUR9C2Q24J

    scripts:
      - name: Get Flutter packages
        script: |
          flutter clean
          flutter pub get

      - name: Install signing files
        script: |
          keychain initialize
          app-store-connect fetch-signing-files com.simfour.auditor --type IOS_APP_STORE
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA for App Store
        script: |
          flutter build ipa --release --export-method app-store

    artifacts:
      - build/ios/ipa/*.ipa