workflows:
  ios-workflow:
    name: Build iOS → App Store
    max_build_duration: 120
    environment:
      flutter: stable
      groups:
        - group

      # Usa los certificados/perfiles que hayas subido en Codemagic UI
      # (Code signing identities). Se emparejan por bundle id y tipo.
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.simfour.auditor

    scripts:
      - name: Get Flutter packages
        script: |
          flutter clean
          flutter pub get

      - name: Apply provisioning profiles
        script: |
          mkdir -p build/logs
          xcode-project use-profiles 2>&1 | tee build/logs/use-profiles.log

      - name: Build IPA
        script: |
          mkdir -p build/logs
          # Use export options generated by xcode-project use-profiles in CI
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist 2>&1 | tee build/logs/ipa-build.log
          ls -lah build/ios/ipa | tee build/logs/ipa-list.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID

        # Envía el build para revisión en App Store (post-processing, sin mac).
        submit_to_app_store: true

    artifacts:
      - build/ios/ipa/*.ipa
      - build/logs/**/*