workflows:
  ios-workflow:
    name: Build iOS → Upload TestFlight
    max_build_duration: 60

    environment:
      flutter: stable

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.simfour.auditor

      vars:
        APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID
        APP_STORE_CONNECT_KEY_IDENTIFIER: $APP_STORE_CONNECT_KEY_IDENTIFIER
        APP_STORE_CONNECT_PRIVATE_KEY: $APP_STORE_CONNECT_PRIVATE_KEY

    scripts:
      - name: Get Flutter packages
        script: |
          flutter clean
          flutter pub get

      - name: Install signing files
        script: |
          keychain initialize
          app-store-connect fetch-signing-files com.simfour.auditor --type IOS_APP_STORE
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          flutter build ipa --release

      - name: Upload IPA to App Store Connect
        script: |
          # Guardar la clave privada en un archivo local
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_IDENTIFIER.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_IDENTIFIER.p8

          # Subir IPA usando altool con la ruta correcta
          xcrun altool \
            --upload-app \
            --type ios \
            --file build/ios/ipa/*.ipa \
            --apiKey $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --apiIssuer $APP_STORE_CONNECT_ISSUER_ID
          
      - name: Show IPA
        script: |
          ls -lah build/ios/ipa

    artifacts:
      - build/ios/ipa/*.ipa